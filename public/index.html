<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; color: #555; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-submit { background-color: #28a745; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-edit { background-color: #ffc107; color: black; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        .loading { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="form-title">📝 Panel de Administración (Agregar / Editar / Ordenar)</h2>
    
    <!-- Formulario para Administrar Datos -->
    <form id="link-form">
        <input type="hidden" id="link-id">
        <div class="form-group">
            <label for="nombre">Nombre del Sitio / Recurso:</label>
            <input type="text" id="nombre" placeholder="Ej. Mi Canal de Twitch" required>
        </div>
        <div class="form-group">
            <label for="url">Enlace (URL):</label>
            <input type="text" id="url" placeholder="Ej. twitch.tv/usuario o https://..." required>
        </div>
        <div class="form-group">
            <label for="orden">Número de Orden (Prioridad):</label>
            <input type="number" id="orden" placeholder="Ej. 1 (Aparecerá primero)" required>
        </div>
        <button type="submit" class="btn-submit" id="btn-save">Guardar Cambios</button>
    </form>

    <h2>📋 Lista Completa de Enlaces</h2>
    <table>
        <thead>
            <tr>
                <th>Orden</th>
                <th>Nombre</th>
                <th>Enlace</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="links-table-body">
            <tr>
                <td colspan="4" class="loading">Conectando con MongoDB Atlas...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const form = document.getElementById('link-form');
    const tableBody = document.getElementById('links-table-body');
    const API_URL = '/datos';

    // 1. OBTENER Y LEER LOS DATOS (GET)
    async function cargarEnlaces() {
        try {
            const res = await fetch(API_URL);
            const enlaces = await res.json();
            tableBody.innerHTML = '';
            
            if (enlaces.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No hay datos registrados.</td></tr>';
                return;
            }

            enlaces.forEach(enlace => {
                const linkCompleto = enlace.url.startsWith('http://') || enlace.url.startsWith('https://') 
                    ? enlace.url 
                    : `https://${enlace.url}`;

                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${enlace.orden}</strong></td>
                        <td>${enlace.nombre}</td>
                        <td><a href="${linkCompleto}" target="_blank">${enlace.url}</a></td>
                        <td>
                            <button class="btn-edit" onclick="prepararEdicion('${enlace._id}', '${enlace.nombre}', '${enlace.url}', ${enlace.orden})">✏️ Editar</button>
                            <button class="btn-delete" onclick="eliminarEnlace('${enlace._id}')">🗑️ Borrar</button>
                        </td>
                    </tr>
                `;
            });
        } catch (err) {
            console.error('Error al cargar enlaces:', err);
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error de conexión con la API /datos</td></tr>';
        }
    }

    // 2. CREAR (POST) O ACTUALIZAR (PUT) DATOS
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('link-id').value;
        const nombre = document.getElementById('nombre').value;
        const url = document.getElementById('url').value;
        const orden = document.getElementById('orden').value;

        const datos = { nombre, url, orden: parseInt(orden) };

        try {
            if (id) {
                // Modo Editar (PUT)
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
            } else {
                // Modo Crear Nuevo (POST)
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
            }

            form.reset();
            document.getElementById('link-id').value = '';
            document.getElementById('form-title').innerText = "📝 Panel de Administración (Agregar / Editar / Ordenar)";
            document.getElementById('btn-save').innerText = "Guardar Cambios";
            cargarEnlaces();
        } catch (err) {
            console.error('Error al guardar:', err);
        }
    });

    // Pasar valores de la fila seleccionada de la tabla al Formulario para editar
    function prepararEdicion(id, nombre, url, orden) {
        document.getElementById('link-id').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('url').value = url;
        document.getElementById('orden').value = orden;
        
        document.getElementById('form-title').innerText = "✏️ Modificando Fila: " + nombre;
        document.getElementById('btn-save').innerText = "Actualizar Registro";
    }

    // 3. ELIMINAR (DELETE) DATOS
    async function eliminarEnlace(id) {
        if (confirm('¿Seguro que deseas eliminar definitivamente este registro de MongoDB?')) {
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarEnlaces();
            } catch (err) {
                console.error('Error al eliminar:', err);
            }
        }
    }

    cargarEnlaces();
</script>
</body>
</html>
